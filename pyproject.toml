[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "OneTrainer"
requires-python = ">=3.10,<3.14"
version = "0.1.0"

dependencies = [
    # base requirements
    "numpy==2.2.6",
    "opencv-python==4.11.0.86",
    "pillow==12.1.1",
    "imagesize==1.4.1",
    "tqdm==4.67.1",
    "pyyaml==6.0.2",
    "huggingface-hub==0.34.4",
    "scipy==1.15.3",
    "matplotlib==3.10.3",
    "av==16.1.0",
    "yt-dlp",
    "scenedetect==0.6.7.1",
    "parse==1.20.2",
    "setuptools==81.0.0",

    # pytorch
    "accelerate==1.12.0",
    "safetensors==0.7.0",
    "tensorboard==2.20.0",
    "pytorch-lightning==2.6.1",

    # diffusion models
    "diffusers @ git+https://github.com/huggingface/diffusers.git@99daaa802da01ef4cff5141f4f3c0329a57fb591",
    "gguf==0.17.1",
    "transformers==4.57.6",
    "sentencepiece==0.2.1",  # transitive dependency of transformers for tokenizer loading
    "omegaconf==2.3.0", # needed to load stable diffusion from single ckpt files
    "invisible-watermark==0.2.0", # needed for the SDXL pipeline

    # other models
    "pooch==1.8.2",
    "open-clip-torch==2.32.0",

    # data loader
    "mgds @ git+https://github.com/Nerogar/mgds.git@5bbafa54386da925f769ca3a767f8bb337637b7d",

    # optimizers
    "dadaptation==3.2",
    "lion-pytorch==0.2.3",
    "prodigyopt==1.1.2",
    "schedulefree==1.4.1",
    "pytorch-optimizer==3.6.0",
    "prodigy-plus-schedule-free==2.0.1",
    "adv-optm==2.2.3",
    "muon-optimizer @ git+https://github.com/KellerJordan/Muon.git@f90a42b28e00b8d9d2d05865fe90d9f39abcbcbd",

    # profiling
    "scalene==2.0.1",

    # ui
    "customtkinter==5.2.2",

    # cloud
    "runpod==1.7.10",
    "fabric==3.2.2",

    # debug
    "psutil==7.0.0",
    "requests==2.32.5",
    "deepdiff==8.6.1", # output easy to read diff for troublshooting
]

[project.optional-dependencies]
cpu = [
  "torch==2.9.1",
  "torchvision==0.24.1",
  "onnxruntime==1.23.2",
]

cuda = [
  "torch==2.9.1",
  "torchvision==0.24.1",
  "onnxruntime-gpu==1.23.2",
  "bitsandbytes==0.49.1",
  "nvidia-nccl-cu12==2.27.5; sys_platform == 'linux'",
  "triton-windows==3.5.1.post24; sys_platform == 'win32'",
]

rocm = [
    "torch==2.9.1",
    "torchvision==0.24.1",
    "onnxruntime==1.23.2",
]

[tool.setuptools.packages.find]
where = ["."]

[tool.ruff]
extend-exclude = [
    # Exclude all third-party dependencies and environments.
    # NOTE: Conda installs mgds+diffusers into "src/" in the project directory.
    ".venv*",
    "venv*",
    "conda_env*",
    "src",
    # Do not lint the universal Python 2/3 version checker.
    "scripts/util/version_check.py",
]
line-length = 120

[tool.ruff.lint]
select = ["F", "E", "W", "I", "B", "UP", "YTT", "BLE", "C4", "T10", "ISC", "ICN", "PIE", "PYI", "RSE", "RET", "SIM", "PGH", "FLY", "NPY", "PERF"]
ignore = ["BLE001", "E402", "E501", "B024", "PGH003", "RET504", "RET505", "SIM102", "UP015", "PYI041"]

[tool.ruff.lint.isort.sections]
hf = ["diffusers*", "transformers*"]
mgds = ["mgds"]
torch = ["torch*"]

[tool.ruff.format]
quote-style = "double"
docstring-code-format = true

[tool.ruff.lint.isort]
known-first-party = ["modules"]
section-order = [
    "future",
    "standard-library",
    "first-party",
    "mgds",
    "torch",
    "hf",
    "third-party",
    "local-folder",
]

[tool.uv]
conflicts = [
    [
        { extra = "cpu" },
        { extra = "cuda" },
        { extra = "rocm" },
    ],
]

[tool.uv.sources]
torch = [
  { index = "torch-cpu", extra = "cpu" },
  { index = "torch-cuda", extra = "cuda" },
  { index = "torch-rocm", extra = "rocm" },
]

[[tool.uv.index]]
name = "torch-cpu"
url = "https://download.pytorch.org/whl/cpu"

[[tool.uv.index]]
name = "torch-cuda"
url = "https://download.pytorch.org/whl/cu128"

[[tool.uv.index]]
name = "torch-rocm"
url = "https://download.pytorch.org/whl/rocm6.3"

[tool.pixi.workspace]
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64", "win-64"]

[tool.pixi.tasks]
train = { cmd = "python scripts/train.py", cwd = "." }
ui = { cmd = "python scripts/train_ui.py", cwd = "." }

[tool.pixi.feature.cpu.pypi-dependencies]
torch = "==2.8.0"
torchvision = "==0.23.0"
onnxruntime = "==1.22.1"

[tool.pixi.feature.cuda]
platforms = ["linux-64", "win-64"]

[tool.pixi.feature.cuda.system-requirements]
cuda = "12.8"

[tool.pixi.feature.rocm]
platforms = ["linux-64"]

[tool.pixi.dependencies]
python = "3.13.*"

[tool.pixi.target.linux-64.dependencies]
tk = "*"
libgl = "*"

[tool.pixi.system-requirements]
linux = "5.17"
libc = { family="glibc", version="2.28" }
macos  = "15.0"

[tool.pixi.pypi-options]
index-strategy = "unsafe-best-match"

[tool.pixi.environments]
cpu = ["cpu"]
cuda = ["cuda"]
rocm = ["rocm"]
